<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    body { background: #0a0a0a; color: white; font-family: Arial; text-align: center; padding: 20px; }
   .back-btn { 
      display: inline-block; margin-bottom: 20px; padding: 10px 20px; 
      background: #4a9eff; color: white; text-decoration: none; border-radius: 8px; 
    }
   .ttt-cell {
      width: 80px; height: 80px; background: #1a1a2e;
      border: 2px solid #4a9eff; border-radius: 8px;
      font-size: 32px; font-weight: bold; color: #4a9eff; cursor: pointer;
    }
   .ttt-cell:hover { background: #2a2a4e; }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← Home</a>
  <h1>Tic Tac Toe 🎮</h1>
 < a href="game2.html" class="back-btn">Next Game →</a>
  
  <div id="status" style="font-size: 18px; margin: 15px 0;">Player X er chal</div>
  <div id="tictactoe-board" style="display: grid; grid-template-columns: repeat(3, 80px); gap: 8px; justify-content: center; margin: 0 auto;"></div>
  <button onclick="resetGame()" style="margin-top: 20px; padding: 10px 20px; background: #4a9eff; border: none; border-radius: 8px; color: white; font-size: 16px; cursor: pointer;">Abar Khelo</button>

  <script>
    let board = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = "X"; let gameActive = true;
    const statusDiv = document.getElementById("status");
    const boardDiv = document.getElementById("tictactoe-board");

    function drawBoard() {
      boardDiv.innerHTML = "";
      board.forEach((cell, index) => {
        const cellEl = document.createElement("button");
        cellEl.className = "ttt-cell";
        cellEl.textContent = cell;
        cellEl.onclick = () => makeMove(index);
        boardDiv.appendChild(cellEl);
      });
    }
    function makeMove(index) {
      if (board[index]!== "" ||!gameActive) return;
      board[index] = currentPlayer; checkResult();
      currentPlayer = currentPlayer === "X"? "O" : "X";
      if (gameActive) statusDiv.textContent = `Player ${currentPlayer} er chal`;
      drawBoard();
    }
    function checkResult() {
      const winCombo = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for (let combo of winCombo) {
        const [a,b,c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          statusDiv.textContent = `Player ${board[a]} Jitlo! 🎉`; gameActive = false; return;
        }
      }
      if (!board.includes("")) { statusDiv.textContent = "Draw! 🤝"; gameActive = false; }
    }
    function resetGame() {
      board = ["", "", "", "", "", "", "", "", ""]; currentPlayer = "X"; gameActive = true;
      statusDiv.textContent = "Player X er chal"; drawBoard();
    }
    drawBoard();
  </script>
</body>
</html>
