<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <style>
    body { background: #0a0a0a; color: white; font-family: Arial; text-align: center; padding: 20px; }
    .btn { padding: 15px 25px; margin: 10px; font-size: 40px; background: #1a1a2e; 
           border: 2px solid #4a9eff; border-radius: 10px; cursor: pointer; }
    .btn:hover { background: #2a2a4e; }
    .nav { margin-bottom: 20px; }
    .nav a { color: #4a9eff; text-decoration: none; margin: 0 10px; padding: 8px 16px; 
             background: #1a1a2e; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="game.html">Game 1</a>
  </div>
  
  <h1>Rock Paper Scissors ✊✋✌️</h1>
  <div id="result" style="font-size: 24px; margin: 20px;">Tomar chal dao</div>
  <div id="score" style="font-size: 18px; margin: 10px;">Tumi: 0 | Computer: 0</div>
  
  <button class="btn" onclick="play('rock')">✊</button>
  <button class="btn" onclick="play('paper')">✋</button>
  <button class="btn" onclick="play('scissors')">✌️</button>

  <script>
    let playerScore = 0, computerScore = 0;
    function play(player) {
      const choices = ['rock', 'paper', 'scissors'];
      const emoji = {rock:'✊', paper:'✋', scissors:'✌️'};
      const computer = choices[Math.floor(Math.random() * 3)];
      let result = '';
      
      if (player === computer) result = 'Draw! 🤝';
      else if ((player === 'rock' && computer === 'scissors') ||
               (player === 'paper' && computer === 'rock') ||
               (player === 'scissors' && computer === 'paper')) {
        result = 'Tumi Jitso! 🎉'; playerScore++;
      } else {
        result = 'Computer Jitlo! 🤖'; computerScore++;
      }
      
      document.getElementById('result').innerHTML = 
        `Tumi: ${emoji[player]} vs Computer: ${emoji[computer]}<br>${result}`;
      document.getElementById('score').textContent = `Tumi: ${playerScore} | Computer: ${computerScore}`;
    }
  </script>
</body>
</html>
