<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tanha,Will you be mine?</title>
<style>
.btn{background:linear-gradient(45deg,#ff4081,#f50057);color:white;border:none;padding:15px 40px;font-size:1.2rem;border-radius:50px;cursor:pointer;margin:10px;box-shadow:0 4px 15px rgba(245,0,87,0.4);transition:all .3s ease}
.btn:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(245,0,87,0.6)}
.btn-no{background:linear-gradient(45deg,#9e9e9e,#616161);box-shadow:0 4px 15px rgba(97,97,97,0.4)}
.btn-no:hover{box-shadow:0 6px 20px rgba(97,97,97,0.6)}
.hearts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.heart{position:absolute;font-size:20px;color:#ff4081;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg);opacity:0}}
.gif-box{display:none;margin-top:20px}
.gif-box img{width:200px;height:200px;border-radius:10px;object-fit:cover}
#heartbox{margin-top:20px;font-size:24px;line-height:1}
.btn{background:linear-gradient(45deg,#ff4081,#f50057);color:white;border:none;padding:15px 40px;font-size:1.2rem;border-radius:50px;cursor:pointer;margin:10px;box-shadow:0 4px 15px rgba(245,0,87,0.4);transition:all .3s ease}
.btn:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(245,0,87,0.6)}
.btn-no{background:linear-gradient(45deg,#9e9e9e,#616161);box-shadow:0 4px 15px rgba(97,97,97,0.4)}
.btn-no:hover{box-shadow:0 6px 20px rgba(97,97,97,0.6)}
.hearts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.heart{position:absolute;font-size:20px;color:#ff4081;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg);opacity:0}}
.gif-box{display:none;margin-top:20px}
.gif-box img{width:200px;height:200px;border-radius:10px;object-fit:cover}
#heartbox{margin-top:20px;font-size:24px;line-height:1}
.flower{position:fixed;bottom:-100px;left:50%;transform:translateX(-50%) scale(0);font-size:100px;transition:all 2s ease-out;z-index:5}
.flower.show{bottom:40%;transform:translateX(-50%) scale(1)}
.caption-box{display:none;margin-top:20px;background:rgba(255,255,255,0.3);padding:15px;border-radius:15px}
.caption-line{opacity:0;animation:fadeIn 1s ease forwards;font-size:1.1rem;color:#d81b60;font-weight:600;margin:8px 0}
.caption-line:nth-child(1){animation-delay:0.5s}
.caption-line:nth-child(2){animation-delay:1.5s}
.caption-line:nth-child(3){animation-delay:2.5s}
@keyframes fadeIn{to{opacity:1}}
</style>
</head>
<body>
<div class="hearts" id="hearts"></div>
<div class="container">
<div id="question">
<h1>Will you be my girlfriend? 💍</h1>
<button class="btn" onclick="yes()">Yes</button>
<button class="btn btn-no" onclick="alert('Please? 🥺')">No</button>
</div>
<div class="gif-box" id="gifbox">
<img src="https://media.giphy.com/media/3oz8xKaR836UJOYeOc/giphy.gif" alt="Happy">
<h1>She said Yes! ✨</h1>
</div>
<div class="caption-box" id="captionBox">
<div class="caption-line">Tanha,you make my world brighter 💫</div>
<div class="caption-line">I promise to love you forever janu 🫠🎀</div>
<div class="caption-line">Will you be mine? 💍</div>
</div>
<div id="heartbox"></div>
</div>
<script>
const q=document.getElementById('question');
const g=document.getElementById('gifbox');
const t=document.getElementById('heartbox');
for(let i=0;i<12;i++){let h=document.createElement('div');h.className='heart';h.innerHTML='💖';h.style.left=Math.random()*100+'vw';h.style.animationDuration=Math.random()*3+7+'s';document.getElementById('hearts').appendChild(h);}
function yes(){q.style.display='none';g.style.display='block';document.getElementById('captionBox').style.display='block';document.getElementById('flower').classList.add('show');let s='';for(let i=0;i<40;i++)s+='💖';t.innerHTML=s;}
</script>
<div class="flower" id="flower">🌷</div>
</body>
</html>
